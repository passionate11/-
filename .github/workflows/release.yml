name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    name: Publish macOS release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag version
        id: version
        run: |
          version="$(cat VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          test "$tag" = "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Release preflight
        run: scripts/preflight_release.sh

      - name: Release readiness
        run: APP_TARGET=outputs/EyeRest.app scripts/release_readiness.sh --strict

      - name: Notarization readiness
        run: scripts/notarize_release.sh

      - name: Generate release notes
        run: scripts/generate_release_notes.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: 松一下 ${{ github.ref_name }}
          body_path: dist/release-notes-${{ steps.version.outputs.version }}.md
          files: |
            dist/songyixia-*.zip
            dist/songyixia-*.zip.sha256
