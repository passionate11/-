name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos-build:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          bash -n scripts/automation_keyword_config_readiness.sh
          bash -n scripts/automation_policy_readiness.sh
          bash -n scripts/build_app.sh
          bash -n scripts/capture_release_evidence.sh
          bash -n scripts/diagnose_app.sh
          bash -n scripts/auto_update_readiness.sh
          bash -n scripts/generate_release_notes.sh
          bash -n scripts/generate_icon.sh
          bash -n scripts/install_app.sh
          bash -n scripts/notarize_release.sh
          bash -n scripts/package_app.sh
          bash -n scripts/preflight_release.sh
          bash -n scripts/release_readiness.sh
          bash -n scripts/release_evidence_readiness.sh
          bash -n scripts/roadmap_status.sh
          bash -n scripts/settings_contract_readiness.sh
          bash -n scripts/settings_visual_readiness.sh
          bash -n scripts/smoke_test.sh
          bash -n scripts/swiftui_migration_readiness.sh
          bash -n scripts/swiftui_parity_plan.sh

      - name: Release preflight
        run: scripts/preflight_release.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: songyixia-macos
          path: |
            dist/songyixia-*.zip
            dist/songyixia-*.zip.sha256
            dist/release-notes-*.md
